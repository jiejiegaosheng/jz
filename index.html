<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>记账本</title>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<style>
:root{--bg:#f5f6fa;--card:#fff;--text:#1a1a2e;--text2:#8e8ea0;--primary:#6c5ce7;--primary2:#a29bfe;--in:#00b894;--out:#ff7675;--save:#6c5ce7;--border:#f0f0f5;--shadow:0 2px 12px rgba(0,0,0,.06);--radius:16px;--radius-sm:10px;--nav-bg:#fff;--nav-h:64px;--input-bg:#f5f6fa;}
.dark{--bg:#0f0f23;--card:#1a1a35;--text:#e8e8f0;--text2:#9e9eb8;--border:#2a2a45;--shadow:0 2px 12px rgba(0,0,0,.3);--nav-bg:#141428;--input-bg:#252545;}
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;-webkit-tap-highlight-color:transparent;outline:none;}
body{background:var(--bg);color:var(--text);transition:background .3s,color .3s;max-widt  h:480px;margin:0 auto;min-height:100vh;overflow-x:hidden;padding-bottom:calc(var(--nav-h) + 12px);position:relative;}
::-webkit-scrollbar{width:0;}

/* Header */
.header{padding:20px 20px 12px;background:linear-gradient(135deg,#6c5ce7,#a29bfe);color:#fff;border-radius:0 0 28px 28px;position:relative;overflow:hidden;}
.header::before{content:'';position:absolute;top:-60px;right:-40px;width:160px;height:160px;background:rgba(255,255,255,.08);border-radius:50%;}
.header::after{content:'';position:absolute;bottom:-30px;left:-20px;width:100px;height:100px;background:rgba(255,255,255,.06);border-radius:50%;}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;position:relative;z-index:1;}
.header-top h1{font-size:20px;font-weight:700;letter-spacing:.5px;}
.header-actions{display:flex;gap:10px;}
.header-actions span{font-size:18px;cursor:pointer;width:34px;height:34px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:rgba(255,255,255,.15);transition:background .2s;}
.header-actions span:active{background:rgba(255,255,255,.3);}
.month-nav{display:flex;align-items:center;justify-content:center;gap:16px;position:relative;z-index:1;margin-bottom:4px;}
.month-nav button{background:rgba(255,255,255,.15);border:none;color:#fff;width:30px;height:30px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s;}
.month-nav button:active{background:rgba(255,255,255,.3);}
.month-nav .cur-month{font-size:15px;font-weight:600;min-width:120px;text-align:center;}

/* Summary Cards */
.summary-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:16px 16px 0;}
.summary-card{background:var(--card);border-radius:var(--radius-sm);padding:14px;text-align:center;box-shadow:var(--shadow);transition:background .3s;border:1px solid var(--border);}
.summary-card .label{font-size:12px;color:var(--text2);margin-bottom:4px;}
.summary-card .value{font-size:18px;font-weight:700;}
.income .value{color:var(--in);}
.expense .value{color:var(--out);}
.balance-card .value{color:var(--primary);}

/* Annual Bar */
.annual-bar{display:flex;align-items:center;gap:8px;padding:10px 16px 0;font-size:13px;color:var(--text2);}
.annual-bar .annual-label{font-weight:600;color:var(--primary);font-size:12px;}
.annual-bar b{color:var(--text);font-weight:700;}
.annual-divider{color:var(--border);font-size:11px;}

/* Quick Actions */
.quick-actions{display:flex;gap:12px;padding:14px 16px 8px;}
.quick-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;padding:12px;border-radius:var(--radius-sm);border:none;font-size:14px;font-weight:600;cursor:pointer;transition:transform .15s,box-shadow .2s;}
.quick-btn:active{transform:scale(.96);}
.quick-btn.income{background:linear-gradient(135deg,#00b894,#00d2a0);color:#fff;box-shadow:0 4px 14px rgba(0,184,148,.3);}
.quick-btn.expense{background:linear-gradient(135deg,#ff7675,#ff9a9a);color:#fff;box-shadow:0 4px 14px rgba(255,118,117,.3);}

/* Year / Month Group */
.year-title{padding:10px 16px 6px;font-size:15px;font-weight:700;color:var(--primary);}
.year-body{padding-left:4px;}
.month-group{margin:0 12px 8px;border-radius:var(--radius-sm);overflow:hidden;background:var(--card);box-shadow:var(--shadow);border:1px solid var(--border);transition:background .3s;}
.month-title{display:flex;align-items:center;gap:6px;padding:12px 14px;font-size:14px;font-weight:600;color:var(--text);cursor:pointer;user-select:none;transition:background .15s;}
.month-title:active{background:var(--input-bg);}
.month-arrow{font-size:12px;color:var(--text2);margin-left:4px;transition:transform .2s;}
.month-title.open .month-arrow{transform:rotate(180deg);}
.month-body{display:none;padding:0 14px 6px;border-top:1px solid var(--border);}
.month-body.show{display:block;}
.month-body .transaction-item:last-child{border-bottom:none;}
.month-body .date-group{margin:2px 0;}
.month-body .date-group:first-child{margin-top:4px;}

/* Date Group */
.date-group{margin:4px 0;}
.date-group-header{display:flex;align-items:center;gap:8px;padding:10px 0 4px;font-size:13px;font-weight:600;color:var(--text2);}
.date-group-header .date-dot{width:5px;height:5px;border-radius:50%;background:var(--primary);opacity:.4;flex-shrink:0;}
.date-sub{color:var(--text2);font-weight:400;font-size:11px;}
.date-day-total{margin-left:auto;font-size:12px;font-weight:600;}

/* Section Header */
.section-header{display:flex;justify-content:space-between;align-items:center;padding:16px 16px 10px;}
.section-header h2{font-size:16px;font-weight:700;}
.section-header .more{font-size:13px;color:var(--primary);cursor:pointer;}

/* Transaction List */
.transaction-list{padding:0 16px;}
.transaction-item{display:flex;align-items:center;gap:12px;padding:14px 0;border-bottom:1px solid var(--border);transition:background .3s;position:relative;overflow:hidden;cursor:pointer;}
.transaction-item:last-child{border-bottom:none;}
.transaction-item:active{background:var(--input-bg);}
.tx-icon{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.tx-cate{font-size:14px;font-weight:600;}
.tx-remark{font-size:12px;color:var(--text2);margin-top:2px;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tx-date{font-size:11px;color:var(--text2);margin-top:1px;}
.tx-amount{font-size:16px;font-weight:700;margin-left:auto;white-space:nowrap;}
.tx-delete{position:absolute;right:-60px;top:0;bottom:0;width:56px;background:#ff7675;color:#fff;border:none;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:right .25s;border-radius:0;}
.transaction-item.swiped .tx-delete{right:0;}

/* Bottom Nav with FAB */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;height:var(--nav-h);background:var(--nav-bg);border-top:1px solid var(--border);display:flex;justify-content:space-around;align-items:center;padding:4px 0 env(safe-area-inset-bottom,6px);z-index:9999;transition:background .3s;}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:1px;padding:4px 10px;cursor:pointer;border:none;background:none;color:var(--text2);font-size:10px;transition:color .2s;position:relative;min-width:48px;}
.nav-item .nav-icon{font-size:20px;line-height:1.2;}
.nav-item.active{color:var(--primary);font-weight:600;}
.nav-fab{position:relative;top:-16px;width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#6c5ce7,#a29bfe);border:none;color:#fff;font-size:26px;cursor:pointer;box-shadow:0 4px 16px rgba(108,92,231,.45);display:flex;align-items:center;justify-content:center;transition:transform .2s;}
.nav-fab:active{transform:scale(.92);}

/* Add Transaction Sheet */
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);z-index:10000;opacity:0;pointer-events:none;transition:opacity .35s;}
.overlay.show{opacity:1;pointer-events:auto;}
.sheet{position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(100%);width:100%;max-width:480px;max-height:92vh;background:var(--card);border-radius:20px 20px 0 0;z-index:10001;transition:transform .4s cubic-bezier(.32,.72,0,1);overflow-y:auto;padding:0;}
.sheet.show{transform:translateX(-50%) translateY(0);}
.sheet-handle{width:36px;height:4px;border-radius:2px;background:var(--border);margin:10px auto 0;}
.sheet-header{display:flex;justify-content:space-between;align-items:center;padding:14px 20px 12px;}
.sheet-header h2{font-size:17px;font-weight:700;}
.sheet-close{width:32px;height:32px;border-radius:50%;border:none;background:var(--input-bg);color:var(--text2);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.sheet-body{padding:0 20px 20px;}
.sheet .form-group{margin-bottom:14px;}
.sheet .form-group label{font-size:13px;color:var(--text2);display:block;margin-bottom:5px;font-weight:500;}
.sheet .form-group input,.sheet .form-group select{width:100%;padding:12px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:15px;background:var(--input-bg);color:var(--text);transition:border .2s;}
.sheet .form-group input:focus,.sheet .form-group select:focus{border-color:var(--primary);}

/* Amount Input (big and bold) */
.amount-wrap{background:var(--input-bg);border-radius:var(--radius-sm);padding:16px;text-align:center;margin-bottom:16px;}
.amount-wrap .currency{font-size:28px;font-weight:700;color:var(--text);vertical-align:middle;}
.amount-wrap input{font-size:36px;font-weight:700;border:none;background:transparent;color:var(--text);width:180px;text-align:center;padding:0;}

.type-toggle{display:flex;gap:8px;margin-bottom:16px;}
.type-btn{flex:1;padding:10px;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:var(--input-bg);color:var(--text2);font-weight:600;font-size:14px;cursor:pointer;transition:all .2s;}
.type-btn:active{transform:scale(.97);}
.type-btn.active{color:#fff;border-color:transparent;}
.type-btn.income.active{background:var(--in);}
.type-btn.expense.active{background:var(--out);}

/* Category Grid */
.cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px;}
.cat-item{display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 4px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:var(--input-bg);cursor:pointer;transition:all .2s;font-size:12px;color:var(--text2);position:relative;}
.cat-item:active{transform:scale(.95);}
.cat-item .cat-icon{font-size:22px;margin-bottom:2px;}
.cat-item.active{border-color:var(--primary);background:rgba(108,92,231,.08);color:var(--primary);font-weight:600;}
.cat-item.active::after{content:'✓';position:absolute;top:2px;right:4px;font-size:9px;color:var(--primary);}

/* Charts */
.chart-container{padding:0 16px;}
.chart-card{background:var(--card);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);margin-bottom:12px;transition:background .3s;border:1px solid var(--border);}
.chart-card h3{font-size:15px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.pie-wrapper{display:flex;align-items:center;gap:16px;padding:8px 0;}
.pie-chart{flex-shrink:0;}
.pie-legend{flex:1;display:flex;flex-direction:column;gap:5px;}
.legend-item{display:flex;align-items:center;gap:8px;font-size:12px;}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.legend-label{color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.legend-value{margin-left:auto;font-weight:600;font-size:12px;white-space:nowrap;}
.trend-bars{display:flex;align-items:flex-end;gap:6px;height:100px;padding:4px 0;}
.bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%;justify-content:flex-end;}
.bar{width:100%;max-width:24px;border-radius:4px 4px 0 0;min-height:4px;transition:height .4s;}
.bar-label{font-size:10px;color:var(--text2);white-space:nowrap;}

/* Budget */
.budget-card{background:var(--card);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);margin-bottom:10px;transition:background .3s;border:1px solid var(--border);}
.budget-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.budget-cate{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:600;}
.budget-nums{font-size:12px;color:var(--text2);}
.budget-bar{height:8px;border-radius:4px;background:var(--border);overflow:hidden;}
.budget-fill{height:100%;border-radius:4px;transition:width .4s;}
.budget-fill.good{background:var(--in);}
.budget-fill.warn{background:#fdcb6e;}
.budget-fill.over{background:var(--out);}
.budget-input-row{display:flex;gap:8px;margin-top:10px;}
.budget-input-row input{flex:1;padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;background:var(--input-bg);color:var(--text);}
.budget-input-row input:focus{border-color:var(--primary);}
.budget-input-row button{padding:8px 14px;border:none;border-radius:8px;background:var(--primary);color:#fff;font-weight:600;font-size:13px;cursor:pointer;white-space:nowrap;}
.budget-input-row button:active{opacity:.85;}

/* Settings */
.settings-list{padding:0 16px;}
.setting-item{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:var(--card);border-radius:var(--radius-sm);margin-bottom:8px;box-shadow:var(--shadow);transition:background .3s;border:1px solid var(--border);cursor:pointer;}
.setting-item:active{opacity:.8;}
.setting-left{display:flex;align-items:center;gap:10px;}
.setting-icon{font-size:18px;}
.setting-label{font-size:14px;font-weight:500;}
.setting-right{display:flex;align-items:center;gap:8px;color:var(--text2);font-size:13px;}
.toggle-switch{width:44px;height:24px;border-radius:12px;background:var(--border);cursor:pointer;position:relative;transition:background .2s;flex-shrink:0;}
.toggle-switch.on{background:var(--primary);}
.toggle-switch::after{content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:#fff;transition:transform .2s;box-shadow:0 1px 4px rgba(0,0,0,.15);}
.toggle-switch.on::after{transform:translateX(20px);}

/* Page visibility */
.page{display:none;}
.page.active{display:block;animation:pageIn .25s ease;}
@keyframes pageIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

/* Empty state */
.empty-state{text-align:center;padding:40px 16px;color:var(--text2);}
.empty-state .empty-icon{font-size:48px;margin-bottom:12px;opacity:.5;}
.empty-state p{font-size:14px;}

/* Toast */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--text);color:var(--bg);padding:10px 20px;border-radius:8px;font-size:13px;opacity:0;pointer-events:none;transition:all .3s;z-index:99999;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* Filter bar */
.filter-bar{display:flex;gap:8px;padding:0 16px 10px;}
.filter-bar input{flex:1;padding:10px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:14px;background:var(--input-bg);color:var(--text);}
.filter-bar input:focus{border-color:var(--primary);}
.filter-bar select{padding:10px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:13px;background:var(--input-bg);color:var(--text);cursor:pointer;}

/* Dark mode compat */
.dark .quick-btn.income{box-shadow:0 4px 14px rgba(0,184,148,.2);}
.dark .quick-btn.expense{box-shadow:0 4px 14px rgba(255,118,117,.2);}
.dark .header{background:linear-gradient(135deg,#5a4bd1,#8b7cf7);}
.dark .cat-item{background:var(--card);}
.dark .cat-item.active{background:rgba(108,92,231,.15);}
.dark .nav-fab{box-shadow:0 4px 16px rgba(108,92,231,.6);}
.dark .amount-wrap{background:var(--card);}

/* Chart Mode Toggle */
.chart-mode-btn{padding:8px 16px;border:1.5px solid var(--border);border-radius:20px;background:var(--input-bg);color:var(--text2);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;}
.chart-mode-btn.active{background:var(--primary);color:#fff;border-color:var(--primary);}

/* Animations */
.fade-in{animation:fadeIn .3s ease both;}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

/* Responsive */
@media(min-width:480px){body{border-left:1px solid var(--border);border-right:1px solid var(--border);}}
</style>
</head>
<body>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Overlay -->
<div class="overlay" id="overlay" onclick="closeSheet()"></div>

<!-- Header -->
<div class="header">
    <div class="header-top">
        <h1>记账本</h1>
        <div class="header-actions">
            <span onclick="openSearch()" title="搜索">🔍</span>
            <span onclick="switchTab('settings')" title="设置">⚙️</span>
        </div>
    </div>
    <div class="month-nav">
        <button onclick="changeMonth(-1)">‹</button>
        <span class="cur-month" id="curMonth"></span>
        <button onclick="changeMonth(1)">›</button>
    </div>
</div>

<!-- Summary -->
<div class="summary-row">
    <div class="summary-card income"><div class="label">收入</div><div class="value" id="sumIncome">¥0</div></div>
    <div class="summary-card expense"><div class="label">支出</div><div class="value" id="sumExpense">¥0</div></div>
    <div class="summary-card balance-card"><div class="label">结余</div><div class="value" id="sumBalance">¥0</div></div>
</div>

<!-- Annual Summary -->
<div class="annual-bar">
    <span class="annual-label">📅 本年</span>
    <span>收 <b id="yearIncome">¥0</b></span>
    <span class="annual-divider">|</span>
    <span>支 <b id="yearExpense">¥0</b></span>
    <span class="annual-divider">|</span>
    <span>余 <b id="yearBalance">¥0</b></span>
</div>

<!-- Quick Actions -->
<div class="quick-actions">
    <button class="quick-btn income" onclick="openAdd('income')">➕ 记一笔收入</button>
    <button class="quick-btn expense" onclick="openAdd('expense')">➖ 记一笔支出</button>
</div>

<!-- Pages -->
<div class="page active" id="pageHome">
    <div class="section-header">
        <h2>最近记录</h2>
        <span class="more" onclick="switchTab('all')">查看全部 →</span>
    </div>
    <div class="transaction-list" id="recentList"></div>
</div>

<div class="page" id="pageAll">
    <div class="section-header">
        <h2>全部记录</h2>
        <span class="more" onclick="switchTab('home')">← 返回</span>
    </div>
    <div class="filter-bar">
        <input type="text" id="searchInput" placeholder="搜索备注、分类..." oninput="renderAllList()">
        <select id="filterType" onchange="renderAllList()">
            <option value="all">全部</option>
            <option value="income">收入</option>
            <option value="expense">支出</option>
        </select>
    </div>
    <div class="transaction-list" id="allList"></div>
</div>

<div class="page" id="pageCharts">
    <div class="section-header"><h2>支出分析</h2></div>
    <div style="display:flex;gap:8px;padding:0 16px 10px;">
        <button class="chart-mode-btn active" id="chartModeMonth" onclick="setChartMode('month')">📅 月</button>
        <button class="chart-mode-btn" id="chartModeYear" onclick="setChartMode('year')">📆 年</button>
    </div>
    <div class="chart-container">
        <div class="chart-card">
            <h3>📊 分类占比</h3>
            <div id="pieSection"><div class="empty-state"><div class="empty-icon">📈</div><p>暂无支出数据</p></div></div>
        </div>
        <div class="chart-card">
            <h3>📈 趋势</h3>
            <div id="trendSection"><div class="empty-state"><div class="empty-icon">📉</div><p>暂无数据</p></div></div>
        </div>
    </div>
</div>

<div class="page" id="pageBudget">
    <div class="section-header"><h2>预算管理</h2><span class="more" id="budgetTotal"></span></div>
    <div class="chart-container" id="budgetList"></div>
</div>

<div class="page" id="pageSettings">
    <div class="section-header"><h2>设置</h2></div>
    <div class="settings-list">
        <div class="setting-item">
            <div class="setting-left"><span class="setting-icon">🌙</span><span class="setting-label">深色模式</span></div>
            <div class="setting-right"><div class="toggle-switch" id="darkToggle" onclick="toggleDark()"></div></div>
        </div>
        <div class="setting-item" onclick="exportData()">
            <div class="setting-left"><span class="setting-icon">📤</span><span class="setting-label">导出数据 (CSV)</span></div>
            <div class="setting-right"><span>›</span></div>
        </div>
        <div class="setting-item" onclick="if(confirm('确定清空所有数据？')){localStorage.clear();location.reload()}">
            <div class="setting-left"><span class="setting-icon">🗑️</span><span class="setting-label">清空数据</span></div>
            <div class="setting-right"><span style="color:var(--out);">›</span></div>
        </div>
        <div class="setting-item" style="justify-content:center;color:var(--text2);font-size:12px;border:none;background:transparent;box-shadow:none;">
            记账本 v2.0 · 数据保存在本地
        </div>
    </div>
</div>

<script>
// ========== DATA ==========
let DATA = JSON.parse(localStorage.getItem('jz_data')) || [];
let BUDGETS = JSON.parse(localStorage.getItem('jz_budgets')) || {};
let DARK = localStorage.getItem('jz_dark') === '1';
let CURRENT_MONTH = new Date().toISOString().slice(0,7);
let ADD_TYPE = 'expense';
let CHART_MODE = 'month';

const CATS = {
    expense: [
        {icon:'🍔',name:'餐饮'},
        {icon:'🚇',name:'交通'},
        {icon:'🛒',name:'购物'},
        {icon:'🏠',name:'生活'},
        {icon:'🎮',name:'娱乐'},
        {icon:'➕',name:'其他'},
    ],
    income: [
        {icon:'💵',name:'工资'},
        {icon:'💼',name:'兼职'},
        {icon:'🎁',name:'红包'},
        {icon:'➕',name:'其他'},
    ]
};

const CAT_COLORS = ['#6c5ce7','#00b894','#ff7675','#fdcb6e','#e17055','#0984e3','#e84393','#00cec9','#636e72','#d63031','#55efc4','#fd79a8','#74b9ff','#a29bfe','#ffeaa7','#fab1a0'];

// ========== INIT ==========
if(DARK) document.body.classList.add('dark');
document.getElementById('darkToggle').classList.toggle('on', DARK);
renderMonth();
refreshAll();
switchTab('home');

// ========== MONTH NAV ==========
function renderMonth(){
    const m = document.getElementById('curMonth');
    const parts = CURRENT_MONTH.split('-');
    m.textContent = `${parts[0]}年${parseInt(parts[1])}月`;
}

function changeMonth(delta){
    const [y,m] = CURRENT_MONTH.split('-').map(Number);
    const total = y*12 + (m-1) + delta;
    const ny = Math.floor(total/12);
    const nm = total%12 + 1;
    CURRENT_MONTH = `${ny}-${String(nm).padStart(2,'0')}`;
    renderMonth();
    refreshAll();
}

// ========== REFRESH ==========
function refreshAll(){
    const list = getMonthData();
    const income = list.filter(i=>i.type==='income').reduce((s,i)=>s+i.amount,0);
    const expense = list.filter(i=>i.type==='expense').reduce((s,i)=>s+i.amount,0);
    document.getElementById('sumIncome').textContent = '¥'+income.toFixed(income%1?2:0);
    document.getElementById('sumExpense').textContent = '¥'+expense.toFixed(expense%1?2:0);
    document.getElementById('sumBalance').textContent = '¥'+(income-expense).toFixed((income-expense)%1?2:0);

    // Yearly totals
    const curYear = CURRENT_MONTH.slice(0,4);
    const yearData = DATA.filter(i=>i.date.slice(0,4)===curYear);
    const yIn = yearData.filter(i=>i.type==='income').reduce((s,i)=>s+i.amount,0);
    const yOut = yearData.filter(i=>i.type==='expense').reduce((s,i)=>s+i.amount,0);
    document.getElementById('yearIncome').textContent = '¥'+yIn.toFixed(yIn%1?2:0);
    document.getElementById('yearExpense').textContent = '¥'+yOut.toFixed(yOut%1?2:0);
    document.getElementById('yearBalance').textContent = '¥'+(yIn-yOut).toFixed((yIn-yOut)%1?2:0);

    // Recent transactions grouped by date
    const allSorted = [...DATA].sort((a,b)=>b.date.localeCompare(a.date)||b.id-a.id);
    const recent = allSorted.slice(0,30);
    renderGroupedList(recent, 'recentList');

    renderAllList();
    renderCharts();
    renderBudgets();
}

function getDateLabel(dateStr){
    const [py,pm,pd] = dateStr.split('-').map(Number);
    const d = new Date(py,pm-1,pd);
    const now = new Date();
    const today = new Date(now.getFullYear(),now.getMonth(),now.getDate());
    const yesterday = new Date(today); yesterday.setDate(yesterday.getDate()-1);
    const diff = Math.round((today-d)/86400000);
    if(diff===0) return '今天';
    if(diff===1) return '昨天';
    if(diff===2) return '前天';
    if(diff<7) return ['周日','周一','周二','周三','周四','周五','周六'][d.getDay()];
    return dateStr;
}

function toggleMonthBody(ym, el){
    const mb = document.getElementById('mb_'+ym);
    if(mb) {
        mb.classList.toggle('show');
        el.classList.toggle('open');
    }
}

function renderGroupedList(list, elId){
    const el = document.getElementById(elId);
    if(!list.length){
        el.innerHTML = '<div class="empty-state"><div class="empty-icon">📝</div><p>暂无记录，点下方 ＋ 开始记账</p></div>';
        return;
    }
    const groups = {};
    list.forEach(i=>{
        if(!groups[i.date]) groups[i.date]=[];
        groups[i.date].push(i);
    });
    const sortedDates = Object.keys(groups).sort((a,b)=>b.localeCompare(a));

    // First pass: compute month stats
    const monthStats = {};
    sortedDates.forEach(date=>{
        const ym = date.slice(0,7);
        if(!monthStats[ym]) monthStats[ym] = {inc:0,exp:0};
        groups[date].forEach(i=>{
            if(i.type==='income') monthStats[ym].inc += i.amount;
            else monthStats[ym].exp += i.amount;
        });
    });

    let html = '', curYear = '', curMonth = '';
    sortedDates.forEach((date,di)=>{
        const ym = date.slice(0,7);
        const y = date.slice(0,4);
        if(y !== curYear){
            if(curMonth) html += `</div></div>`; // close month-body + month-group
            if(curYear) html += `</div>`; // close year-body
            curYear = y; curMonth = '';
            html += `<div class="year-title">${y}年</div><div class="year-body">`;
        }
        if(ym !== curMonth){
            if(curMonth) html += `</div></div>`; // close prev month
            curMonth = ym;
            const ms = monthStats[ym];
            const net = ms.inc - ms.exp;
            html += `<div class="month-group"><div class="month-title open" onclick="toggleMonthBody('${ym}',this)">
                ${ym.replace('-','年')+'月'}
                <span style="font-weight:400;font-size:12px;color:var(--text2);margin-left:8px;">收${ms.inc.toFixed(0)} 支${ms.exp.toFixed(0)}</span>
                <span style="margin-left:auto;font-size:12px;font-weight:600;color:${net>=0?'var(--in)':'var(--out)'}">${net>=0?'+':''}¥${net.toFixed(0)}</span>
                <span class="month-arrow">▾</span>
            </div><div class="month-body show" id="mb_${ym}">`;
        }
        const label = getDateLabel(date);
        const dayTotal = groups[date].reduce((s,i)=>s+i.amount*(i.type==='income'?1:-1),0);
        html += `<div class="date-group${di===0?'':' fade-in'}">
            <div class="date-group-header">
                <span class="date-dot"></span>
                ${label} ${label===date?'':`<span class="date-sub">${date}</span>`}
                <span class="date-day-total" style="color:${dayTotal>=0?'var(--in)':'var(--out)'}">${dayTotal>=0?'+':''}¥${dayTotal.toFixed(0)}</span>
            </div>`;
        groups[date].forEach(i=>{
            const icon = findCat(i.type,i.cate).icon;
            const sign = i.type==='income'?'+':'-';
            const color = i.type==='income'?'var(--in)':'var(--out)';
            html += `<div class="transaction-item" data-id="${i.id}" ontouchstart="swipeStart(event,${i.id})" ontouchend="swipeEnd(event,${i.id})" onclick="viewItem(${i.id})">
                <div class="tx-icon" style="background:${i.type==='income'?'rgba(0,184,148,.12)':'rgba(255,118,117,.12)'}">${icon}</div>
                <div><div class="tx-cate">${i.cate}</div>${i.note?`<div class="tx-remark">${i.note}</div>`:''}</div>
                <div class="tx-amount" style="color:${color}">${sign}¥${i.amount.toFixed(i.amount%1?2:0)}</div>
                <button class="tx-delete" onclick="event.stopPropagation();deleteTx(${i.id})">✕</button>
            </div>`;
        });
        html += `</div>`;
    });
    if(curMonth) html += `</div></div>`; // close last month
    if(curYear) html += `</div>`; // close last year-body
    el.innerHTML = html;
}

function getMonthData(){
    return DATA.filter(i=>i.date.slice(0,7)===CURRENT_MONTH);
}

// ========== TRANSACTION LIST ==========
function renderAllList(){
    const keyword = document.getElementById('searchInput').value.trim().toLowerCase();
    const filterType = document.getElementById('filterType').value;
    let filtered = [...DATA];
    if(filterType!=='all') filtered = filtered.filter(i=>i.type===filterType);
    if(keyword) filtered = filtered.filter(i=>i.cate.includes(keyword)||(i.note||'').toLowerCase().includes(keyword));
    filtered.sort((a,b)=>b.date.localeCompare(a.date)||b.id-a.id);
    renderGroupedList(filtered, 'allList');
}

// ========== SWIPE TO DELETE ==========
let swipeState = {id:null,startX:0,swiping:false};

function swipeStart(e,id){
    const t = e.touches[0];
    swipeState = {id,startX:t.clientX,swiping:true};
    // reset others
    document.querySelectorAll('.transaction-item.swiped').forEach(el=>el.classList.remove('swiped'));
}

function swipeEnd(e,id){
    if(!swipeState.swiping) return;
    const t = e.changedTouches[0];
    const dx = swipeState.startX - t.clientX;
    if(dx > 40){
        const el = document.querySelector(`.transaction-item[data-id="${id}"]`);
        if(el) el.classList.add('swiped');
    }
    swipeState.swiping = false;
}

// close swipe on scroll
document.addEventListener('scroll',()=>{
    document.querySelectorAll('.transaction-item.swiped').forEach(el=>el.classList.remove('swiped'));
}, {passive:true});

// ========== DELETE ==========
function deleteTx(id){
    DATA = DATA.filter(i=>i.id!==id);
    localStorage.setItem('jz_data', JSON.stringify(DATA));
    refreshAll();
    showToast('已删除');
}

// ========== VIEW ITEM (click to open edit/delete) ==========
function viewItem(id){
    const i = DATA.find(d=>d.id===id);
    if(!i) return;
    if(confirm(`金额: ¥${i.amount.toFixed(2)}\n分类: ${i.cate}\n日期: ${i.date}\n备注: ${i.note||'无'}\n\n确定删除这条记录？`)){
        deleteTx(id);
    }
}

// ========== ADD TRANSACTION ==========
function openAdd(type){
    ADD_TYPE = type;
    document.getElementById('addSheetTitle').textContent = type==='income'?'记一笔收入':'记一笔支出';
    document.getElementById('addTypeToggle').querySelector('.income').classList.toggle('active',type==='income');
    document.getElementById('addTypeToggle').querySelector('.expense').classList.toggle('active',type==='expense');
    document.getElementById('addAmount').value = '';
    document.getElementById('addDate').valueAsDate = new Date();
    document.getElementById('addNote').value = '';
    renderCatGrid();
    document.getElementById('addSheet').classList.add('show');
    document.getElementById('overlay').classList.add('show');
    setTimeout(()=>document.getElementById('addAmount').focus(), 400);
}

function setAddType(type){
    ADD_TYPE = type;
    document.getElementById('addSheetTitle').textContent = type==='income'?'记一笔收入':'记一笔支出';
    document.querySelectorAll('.type-btn').forEach(b=>b.classList.remove('active'));
    document.getElementById('addTypeToggle').querySelector('.'+type).classList.add('active');
    renderCatGrid();
}

function renderCatGrid(){
    const cats = CATS[ADD_TYPE]||CATS.expense;
    const grid = document.getElementById('addCatGrid');
    grid.innerHTML = cats.map((c,i)=>{
        const idx = DATA.filter(d=>d.type===ADD_TYPE&&d.cate===c.name).length;
        const color = CAT_COLORS[i%CAT_COLORS.length];
        return `<div class="cat-item${i===0?' active':''}" data-cat="${c.name}" onclick="selectCat(this,'${c.name}')">
            <span class="cat-icon">${c.icon}</span>${c.name}
        </div>`;
    }).join('');
}

function selectCat(el, name){
    document.querySelectorAll('.cat-item').forEach(c=>c.classList.remove('active'));
    el.classList.add('active');
}

function closeSheet(){
    document.getElementById('addSheet').classList.remove('show');
    document.getElementById('overlay').classList.remove('show');
}

function saveTransaction(){
    const amount = parseFloat(document.getElementById('addAmount').value);
    if(!amount||amount<=0) return showToast('请输入有效金额');
    const date = document.getElementById('addDate').value;
    if(!date) return showToast('请选择日期');
    const note = document.getElementById('addNote').value.trim();
    const selected = document.querySelector('.cat-item.active');
    const cate = selected ? selected.dataset.cat : (CATS[ADD_TYPE][0]||{name:'其他'}).name;
    DATA.push({
        id: Date.now(),
        type: ADD_TYPE,
        cate,
        amount: Math.round(amount*100)/100,
        date,
        note
    });
    localStorage.setItem('jz_data', JSON.stringify(DATA));
    closeSheet();
    refreshAll();
    showToast('保存成功 ✨');
}

function findCat(type,name){
    const cats = CATS[type]||CATS.expense;
    return cats.find(c=>c.name===name)||{icon:'📌',name};
}

// ========== OCR RECOGNITION ==========
async function handleOCR(input){
    const file = input.files[0];
    if(!file) return;
    // Ensure expense type selected
    setAddType('expense');
    showToast('⏳ 识别中...');
    try {
        const { data: { text } } = await Tesseract.recognize(file, 'chi_sim+eng', {
            logger: m => {
                if(m.status==='recognizing text' && m.progress<1)
                    document.getElementById('toast').textContent = `⏳ 识别中 ${Math.round(m.progress*100)}%`;
            }
        });
        // Extract amount: ¥123.45 / 实付123.45 / total 123.45
        const amountMatch = text.match(/[¥￥]\s*(\d{1,8}(?:[.,]\d{3})*(?:[.]\d{1,2})?)/);
        const amountMatch2 = text.match(/(?:总计|合计|金额|实付|消费|支付|total)[：:\s]*[¥￥]?\s*(\d{1,8}(?:[.,]\d{3})*(?:[.]\d{1,2})?)/);
        const amountMatch3 = text.match(/(\d+[.]\d{2})\s*(?:元)/);
        const amt = amountMatch || amountMatch2 || amountMatch3;
        if(amt){
            const val = parseFloat(amt[1].replace(/,/g,''));
            if(!isNaN(val)) document.getElementById('addAmount').value = val;
        }
        // Extract category keywords
        const keywordMap = {
            '餐饮|饭|吃|餐厅|外卖|咖啡|奶茶|美食|麦当劳|肯德基|食堂|早餐|午餐|晚餐|火锅|烧烤': '餐饮',
            '交通|地铁|公交|打车|滴滴|加油|停车|高铁|机票|火车|共享单车': '交通',
            '购物|超市|商场|淘宝|京东|拼多多|商店|零售|便利店|买': '购物',
            '生活|水电|物业|燃气|房租|话费|网费|理发|洗衣|家政': '生活',
            '娱乐|电影|游戏|KTV|旅游|酒店|门票|健身|运动|酒吧': '娱乐',
        };
        for(const [pattern, cate] of Object.entries(keywordMap)){
            if(new RegExp(pattern,'i').test(text)){
                document.querySelectorAll('.cat-item').forEach(el=>{
                    if(el.dataset.cat === cate) el.click();
                });
                break;
            }
        }
        showToast('✅ 识别完成，请确认金额和分类');
    } catch(e){
        showToast('❌ 识别失败，请手动输入');
        console.error('OCR error:', e);
    }
    input.value = '';
}

// ========== CHARTS ==========
function setChartMode(mode){
    CHART_MODE = mode;
    const mb = document.getElementById('chartModeMonth');
    const yb = document.getElementById('chartModeYear');
    if(mode==='month'){ mb.classList.add('active'); yb.classList.remove('active'); }
    else{ yb.classList.add('active'); mb.classList.remove('active'); }
    renderCharts();
}

function renderCharts(){
    const expenseList = DATA.filter(i=>i.type==='expense');
    renderPieChart(expenseList);
    renderTrend(expenseList);
    // Also render annual summary card
    renderAnnualChartCard(expenseList);
}

function renderAnnualChartCard(list){
    const curYear = CURRENT_MONTH.slice(0,4);
    const yearList = list.filter(i=>i.date.slice(0,4)===curYear);
    const monthList = list.filter(i=>i.date.slice(0,7)===CURRENT_MONTH);
    const target = CHART_MODE==='year' ? yearList : monthList;
    const yIn = DATA.filter(i=>i.type==='income'&&i.date.slice(0,4)===curYear).reduce((s,i)=>s+i.amount,0);
    const yOut = yearList.reduce((s,i)=>s+i.amount,0);
    const mIn = DATA.filter(i=>i.type==='income'&&i.date.slice(0,7)===CURRENT_MONTH).reduce((s,i)=>s+i.amount,0);
    const mOut = monthList.reduce((s,i)=>s+i.amount,0);
    const inc = CHART_MODE==='year'?yIn:mIn;
    const out = CHART_MODE==='year'?yOut:mOut;

    const prefix = CHART_MODE==='year' ? curYear+'年' : CURRENT_MONTH.replace('-','年')+'月';
    // inject summary card
    const header = document.querySelector('#pageCharts .section-header');
    if(header){
        const existing = document.getElementById('chartSummaryCard');
        if(!existing){
            const div = document.createElement('div');
            div.id = 'chartSummaryCard';
            div.className = 'summary-row';
            div.style.paddingTop = '0';
            div.innerHTML = `
                <div class="summary-card income"><div class="label">${prefix}收入</div><div class="value" id="chartSumIn">¥${inc.toFixed(inc%1?2:0)}</div></div>
                <div class="summary-card expense"><div class="label">${prefix}支出</div><div class="value" id="chartSumOut">¥${out.toFixed(out%1?2:0)}</div></div>
                <div class="summary-card balance-card"><div class="label">${prefix}结余</div><div class="value" id="chartSumBal">¥${(inc-out).toFixed((inc-out)%1?2:0)}</div></div>`;
            header.after(div);
        } else {
            existing.querySelector('#chartSumIn').textContent = '¥'+inc.toFixed(inc%1?2:0);
            existing.querySelector('#chartSumOut').textContent = '¥'+out.toFixed(out%1?2:0);
            existing.querySelector('#chartSumBal').textContent = '¥'+(inc-out).toFixed((inc-out)%1?2:0);
            existing.querySelectorAll('.label').forEach(l=>l.textContent = prefix+(l.textContent.includes('收入')?'收入':l.textContent.includes('支出')?'支出':'结余'));
        }
    }
}

function renderPieChart(list){
    const section = document.getElementById('pieSection');
    if(!list.length){
        section.innerHTML = '<div class="empty-state"><div class="empty-icon">📈</div><p>暂无支出数据</p></div>';
        return;
    }
    const curYear = CURRENT_MONTH.slice(0,4);
    const cur = CHART_MODE==='year'
        ? list.filter(i=>i.date.slice(0,4)===curYear)
        : list.filter(i=>i.date.slice(0,7)===CURRENT_MONTH);
    if(!cur.length){
        const emptyMsg = CHART_MODE==='year' ? `${curYear}年暂无支出` : '本月暂无支出';
        section.innerHTML = `<div class="empty-state"><div class="empty-icon">📈</div><p>${emptyMsg}</p></div>`;
        return;
    }
    const grouped = {};
    cur.forEach(i=>{grouped[i.cate]=(grouped[i.cate]||0)+i.amount});
    const entries = Object.entries(grouped).sort((a,b)=>b[1]-a[1]);
    const total = entries.reduce((s,e)=>s+e[1],0);

    const colors = entries.map((_,i)=>CAT_COLORS[i%CAT_COLORS.length]);
    const svgW = 140, svgH = 140, cx = svgW/2, cy = svgH/2, r = 58;

    let pathD = '';
    let cumulative = 0;
    entries.forEach(([name,val],i)=>{
        const pct = val/total;
        const angle = pct*360;
        const startAngle = cumulative;
        cumulative += angle;
        const sr = startAngle-90, er = cumulative-90;
        const sra = sr*Math.PI/180, era = er*Math.PI/180;
        const x1 = cx + r*Math.cos(sra), y1 = cy + r*Math.sin(sra);
        const x2 = cx + r*Math.cos(era), y2 = cy + r*Math.sin(era);
        const large = angle>180?1:0;
        pathD += `<path d="M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${large},1 ${x2},${y2} Z" fill="${colors[i]}"/>`;
    });

    const innerR = 38;
    const label = CHART_MODE==='year' ? CURRENT_MONTH.slice(0,4)+'年' : '本月';
    pathD += `<circle cx="${cx}" cy="${cy}" r="${innerR}" fill="var(--card)"/>`;
    pathD += `<text x="${cx}" y="${cy-4}" text-anchor="middle" font-size="20" font-weight="bold" fill="var(--text)">¥${total.toFixed(total%1?2:0)}</text>`;
    pathD += `<text x="${cx}" y="${cy+14}" text-anchor="middle" font-size="11" fill="var(--text2)">${label}支出</text>`;

    let legendHtml = entries.map(([name,val],i)=>{
        const pct = (val/total*100).toFixed(1);
        return `<div class="legend-item"><span class="legend-dot" style="background:${colors[i]}"></span><span class="legend-label">${name}</span><span class="legend-value" style="color:var(--text)">¥${val.toFixed(0)} (${pct}%)</span></div>`;
    }).join('');

    section.innerHTML = `<div class="pie-wrapper">
        <div class="pie-chart"><svg width="${svgW}" height="${svgH}" viewBox="0 0 ${svgW} ${svgH}">${pathD}</svg></div>
        <div class="pie-legend">${legendHtml}</div>
    </div>`;
}

function renderTrend(list){
    const section = document.getElementById('trendSection');
    const now = new Date();
    const curYear = parseInt(CURRENT_MONTH.slice(0,4));

    if(CHART_MODE==='year'){
        // Show monthly breakdown of the selected year
        const months = [];
        for(let m=1;m<=12;m++){
            const ym = `${curYear}-${String(m).padStart(2,'0')}`;
            months.push(ym);
        }
        const data = months.map(ym=>{
            const total = list.filter(i=>i.date.slice(0,7)===ym).reduce((s,i)=>s+i.amount,0);
            return {month:ym,total};
        });
        const max = Math.max(...data.map(d=>d.total),1);
        const bars = data.map((d,i)=>{
            const h = Math.max(4, (d.total/max)*90);
            const color = d.total>0 ? CAT_COLORS[i%CAT_COLORS.length] : 'var(--border)';
            return `<div class="bar-wrap"><div class="bar" style="height:${h}px;background:${color}"></div><div class="bar-label">${i+1}月</div></div>`;
        }).join('');
        section.innerHTML = `<div style="padding:4px 0;">
            <div style="font-size:12px;color:var(--text2);margin-bottom:4px;">${curYear}年 各月支出</div>
            <div class="trend-bars">${bars}</div>
        </div>`;
        return;
    }

    // Month mode: show last 6 months
    const months = [];
    for(let i=5;i>=0;i--){
        const d = new Date(now.getFullYear(),now.getMonth()-i,1);
        months.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`);
    }
    const data = months.map(m=>{
        const total = list.filter(i=>i.date.slice(0,7)===m).reduce((s,i)=>s+i.amount,0);
        return {month:m,total};
    });
    const max = Math.max(...data.map(d=>d.total),1);
    const bars = data.map((d,i)=>{
        const h = Math.max(4, (d.total/max)*90);
        const color = d.total>0 ? CAT_COLORS[i%CAT_COLORS.length] : 'var(--border)';
        const p = d.month.split('-');
        return `<div class="bar-wrap"><div class="bar" style="height:${h}px;background:${color}"></div><div class="bar-label">${p[1]}月</div></div>`;
    }).join('');
    section.innerHTML = `<div style="padding:4px 0;">
        <div class="trend-bars">${bars}</div>
    </div>`;
}

// ========== BUDGET ==========
function renderBudgets(){
    const el = document.getElementById('budgetList');
    const expenseCats = CATS.expense.map(c=>c.name);
    const monthExpense = DATA.filter(i=>i.type==='expense'&&i.date.slice(0,7)===CURRENT_MONTH);
    const grouped = {};
    monthExpense.forEach(i=>{grouped[i.cate]=(grouped[i.cate]||0)+i.amount});
    const totalBudget = Object.values(BUDGETS).reduce((s,v)=>s+v,0);
    const totalSpent = monthExpense.reduce((s,i)=>s+i.amount,0);
    document.getElementById('budgetTotal').textContent = totalBudget?`¥${totalSpent.toFixed(0)}/¥${totalBudget.toFixed(0)}`:'';

    let html = expenseCats.map(cate=>{
        const spent = grouped[cate]||0;
        const budget = BUDGETS[cate]||0;
        const pct = budget>0?Math.min(spent/budget*100,100):0;
        const cls = pct>=100?'over':pct>=80?'warn':'good';
        const barStyle = budget>0?`width:${pct}%`:'width:0';
        const remain = budget-spent;
        return `<div class="budget-card">
            <div class="budget-header">
                <div class="budget-cate"><span class="cat-icon">${findCat('expense',cate).icon}</span>${cate}</div>
                <div class="budget-nums">${budget?`¥${spent.toFixed(0)}/¥${budget.toFixed(0)}`:'未设置预算'}</div>
            </div>
            <div class="budget-bar"><div class="budget-fill ${cls}" style="${barStyle}"></div></div>
            <div class="budget-input-row">
                <input type="number" placeholder="月预算 (¥)" value="${budget||''}" id="budgetInput_${cate}" min="0">
                <button onclick="setBudget('${cate}')">设置</button>
            </div>
            ${budget>0?`<div style="font-size:11px;color:var(--text2);margin-top:4px;">${remain>=0?`剩余 ¥${remain.toFixed(0)}`:`超支 ¥${Math.abs(remain).toFixed(0)}`}</div>`:''}
        </div>`;
    }).join('');
    el.innerHTML = html || '<div class="empty-state"><div class="empty-icon">🎯</div><p>暂无支出分类</p></div>';
}

function setBudget(cate){
    const val = parseFloat(document.getElementById(`budgetInput_${cate}`).value);
    if(!val||val<0) return showToast('请输入有效预算');
    BUDGETS[cate] = val;
    localStorage.setItem('jz_budgets', JSON.stringify(BUDGETS));
    renderBudgets();
    showToast(`✅ ${cate} 预算已设置`);
}

// ========== SEARCH ==========
function openSearch(){
    switchTab('all');
    document.getElementById('searchInput').focus();
}

// ========== EXPORT ==========
function exportData(){
    if(!DATA.length) return showToast('暂无数据可导出');
    let csv = '类型,分类,金额,日期,备注\n';
    DATA.forEach(i=>{
        const typeName = i.type==='income'?'收入':'支出';
        csv += `${typeName},${i.cate},${i.amount},${i.date},${(i.note||'').replace(/,/g,'，')}\n`;
    });
    const blob = new Blob(['\ufeff'+csv], {type:'text/csv;charset=utf-8;'});
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = `记账本_${new Date().toISOString().slice(0,10)}.csv`;
    link.click();
    URL.revokeObjectURL(link.href);
    showToast('✅ 导出成功');
}

function showToast(msg){
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._hide);
    t._hide = setTimeout(()=>t.classList.remove('show'),2000);
}

// ========== DARK MODE ==========
function toggleDark(){
    DARK = !DARK;
    document.body.classList.toggle('dark', DARK);
    document.getElementById('darkToggle').classList.toggle('on', DARK);
    localStorage.setItem('jz_dark', DARK?'1':'0');
}

// ========== TAB SWITCH ==========
function switchTab(tab){
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
    const pageMap = {home:'pageHome',all:'pageAll',charts:'pageCharts',budget:'pageBudget',settings:'pageSettings'};
    const navMap = {home:0,all:1,charts:3,budget:4,settings:-1};
    document.getElementById(pageMap[tab]).classList.add('active');
    if(navMap[tab]>=0) document.querySelectorAll('.nav-item')[navMap[tab]].classList.add('active');
    if(tab==='all') renderAllList();
    if(tab==='charts') renderCharts();
    if(tab==='budget') renderBudgets();
}
</script>
